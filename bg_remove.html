<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🐹 ハムスター背景除去ツール</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background: #fafafa; }
  h2 { color: #e05; }
  canvas { display: none; }
  img { max-width: 300px; border: 1px solid #ccc; border-radius: 8px; }
  .row { display: flex; gap: 24px; align-items: flex-start; margin: 16px 0; }
  .box { text-align: center; }
  label { font-size: 13px; color: #666; display: block; margin-top: 6px; }
  button { padding: 12px 28px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #e05; color: #fff; margin-top: 12px; }
  button:disabled { background: #aaa; cursor: default; }
  #status { margin-top: 12px; font-weight: bold; color: #333; }
  #step2 { display: none; margin-top: 24px; border-top: 2px solid #eee; padding-top: 24px; }
  textarea { width: 100%; height: 80px; font-size: 11px; }
  .tip { font-size: 13px; color: #888; margin-top: 8px; }
  input[type=range] { width: 200px; }
</style>
</head>
<body>
<h2>🐹 ハムスター背景除去ツール</h2>
<p><b>おすし写真.png</b> を選んで「背景を除去」を押してください。<br>
黒帯と白背景が自動で透明になります。</p>

<input type="file" id="file" accept="image/*">

<div style="margin-top:12px">
  <label>黒帯しきい値（大きいほど黒を多く消す）: <span id="darkVal">40</span>
    <br><input type="range" id="darkThresh" min="10" max="100" value="40"></label>
  <label style="margin-top:8px">白背景しきい値（大きいほど白を多く消す）: <span id="lightVal">230</span>
    <br><input type="range" id="lightThresh" min="180" max="255" value="230"></label>
</div>

<button id="btnRemove" disabled>✂️ 背景を除去</button>
<div id="status"></div>

<div class="row" id="preview" style="display:none">
  <div class="box"><img id="imgBefore"><label>変換前</label></div>
  <div class="box"><img id="imgAfter"><label>背景除去後</label></div>
</div>

<div id="step2">
  <h3>✅ 完了！ 次のステップ</h3>
  <p>以下のbase64をコピーして、<code>hamster_override.js</code> の<br>
  <code>const BASE64_IMAGE = '<b>[ここ]</b>';</code> と差し替えてください。</p>
  <textarea id="b64out" readonly></textarea>
  <br>
  <button onclick="downloadUpdatedJS()">⬇️ 更新済み hamster_override.js をダウンロード</button>
  <div id="copyMsg" style="color:green;font-weight:bold;margin-top:6px"></div>
  <p class="tip">💡 ダウンロードしたファイルを <code>C:\Users\sushi\portfolio\</code> にある<br>
  <code>hamster_override.js</code> と置き換えてください。</p>
</div>

<canvas id="canvas"></canvas>

<script>
  const fileInput = document.getElementById('file');
  const btnRemove = document.getElementById('btnRemove');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const darkSlider = document.getElementById('darkThresh');
  const lightSlider = document.getElementById('lightThresh');

  darkSlider.oninput = () => document.getElementById('darkVal').textContent = darkSlider.value;
  lightSlider.oninput = () => document.getElementById('lightVal').textContent = lightSlider.value;

  let loadedImg = null;

  fileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        loadedImg = img;
        document.getElementById('imgBefore').src = ev.target.result;
        document.getElementById('preview').style.display = 'flex';
        btnRemove.disabled = false;
        document.getElementById('status').textContent = '画像を読み込みました。「背景を除去」を押してください。';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  btnRemove.onclick = () => {
    if (!loadedImg) return;
    document.getElementById('status').textContent = '処理中...';

    const darkT = parseInt(darkSlider.value);
    const lightT = parseInt(lightSlider.value);

    canvas.width = loadedImg.naturalWidth;
    canvas.height = loadedImg.naturalHeight;
    ctx.drawImage(loadedImg, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      // 黒帯: RGB全て暗い
      if (r < darkT && g < darkT && b < darkT) {
        data[i+3] = 0;
      }
      // 白背景: RGB全て明るい
      else if (r > lightT && g > lightT && b > lightT) {
        data[i+3] = 0;
      }
    }

    ctx.putImageData(imageData, 0, 0);

    const result = canvas.toDataURL('image/png');
    document.getElementById('imgAfter').src = result;
    document.getElementById('b64out').value = result;
    document.getElementById('step2').style.display = 'block';
    document.getElementById('status').textContent = '✅ 背景除去完了！';
  };

  function downloadUpdatedJS() {
    const b64 = document.getElementById('b64out').value;
    const js = `(function() {
  // 🐹 Jelly Mario ハムスター差し替えスクリプト
  // jellymar.io のブラウザコンソールに貼り付けて実行してください。
  // ページを再読み込みすると元のマリオに戻ります。

  const BASE64_IMAGE = '${b64}';

  const hamster = new Image();
  hamster.src = BASE64_IMAGE;

  const origDrawImage = CanvasRenderingContext2D.prototype.drawImage;

  CanvasRenderingContext2D.prototype.drawImage = function(img, ...args) {
    if (img instanceof HTMLImageElement) {
      if (args.length === 8) {
        const [sx, sy, sw, sh, dx, dy, dw, dh] = args;
        origDrawImage.call(this, hamster, 0, 0, hamster.naturalWidth || hamster.width, hamster.naturalHeight || hamster.height, dx, dy, dw, dh);
      } else {
        origDrawImage.call(this, hamster, ...args);
      }
    } else {
      origDrawImage.call(this, img, ...args);
    }
  };

  console.log('%c🐹 ハムスター注入完了！', 'color: #ff6b9d; font-size: 18px; font-weight: bold;');
  console.log('マリオがハムスターに変わります。ページを再読み込みすると元に戻ります。');
})();`;

    const blob = new Blob([js], { type: 'text/javascript' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hamster_override.js';
    a.click();
    document.getElementById('copyMsg').textContent = 'ダウンロードしました！portfolio フォルダの hamster_override.js と置き換えてください。';
  }
</script>
</body>
</html>
